# Render blueprint for the WizCodes blog agent.
# A FREE Cron Job — no always-on worker needed. Render invokes `main.py` hourly;
# each run publishes only if the day's plan says a post is due now.
#
# Deploy: push this repo to GitHub, then in Render → New → Blueprint, point at it.
# Set the secret env vars (marked sync:false) in the Render dashboard.

services:
  - type: cron
    name: wizcodes-blog-agent
    runtime: python
    plan: free
    # Hourly. The planner decides whether a post is actually due this hour, so
    # most runs exit in a second. Bump to "*/15 * * * *" for minute-finer timing.
    schedule: "0 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    autoDeploy: true
    envVars:
      # ── Proxy (secrets — set in dashboard) ──
      - key: ANTHROPIC_BASE_URL
        value: https://api3.claudestore.store
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4.6
      - key: ANTHROPIC_SMALL_FAST_MODEL
        value: claude-haiku-4.5
      # ── GitHub publishing (secrets) ──
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_REPO
        value: dkcodes121617/wizcodes_main_website
      - key: GITHUB_BRANCH
        value: main
      - key: GIT_AUTHOR_NAME
        value: WizCodes Blog Bot
      - key: GIT_AUTHOR_EMAIL
        value: business@wizcodes.site
      # ── Cadence ──
      - key: MAX_POSTS_PER_DAY
        value: "2"
      - key: AVG_POSTS_PER_DAY
        value: "1.3"
      - key: PUBLISH_WINDOW_START
        value: "8"
      - key: PUBLISH_WINDOW_END
        value: "22"
      - key: MIN_GAP_HOURS
        value: "4"
      - key: SCHEDULE_TZ
        value: Asia/Kolkata
      # ── Uniqueness ──
      - key: TOPIC_SIM_THRESHOLD
        value: "0.82"
      - key: BODY_SIM_THRESHOLD
        value: "0.86"
      # ── Live publishing ON (set to 1 to test without pushing) ──
      - key: DRY_RUN
        value: "0"
      - key: LOG_LEVEL
        value: INFO
      # Cache HF model between runs to avoid re-downloading MiniLM each cron fire.
      - key: HF_HOME
        value: /opt/render/project/.cache/huggingface
