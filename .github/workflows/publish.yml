name: Publish blog post

# Runs the agent on a schedule — FREE on this public repo (public repos get
# unlimited GitHub Actions minutes). Each run decides whether a post is due now
# (deterministic daily plan vs. posts already published today) and, if so,
# generates one and commits it to the site repo, which triggers that repo's
# Firebase deploy workflow.

on:
  schedule:
    # Hourly. GitHub may delay scheduled runs under load — fine for 1-2 posts/day.
    - cron: "0 * * * *"
  workflow_dispatch:
    # Manual "Run workflow" button. Optionally force a post ignoring the schedule.
    inputs:
      force:
        description: "Force one post now (ignore the schedule)"
        type: boolean
        default: false

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout agent
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-minilm-l6-v2

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run agent
        env:
          ANTHROPIC_BASE_URL: https://api3.claudestore.store
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: claude-sonnet-4.6
          ANTHROPIC_SMALL_FAST_MODEL: claude-haiku-4.5
          # NOTE: the secret is named PUBLISH_TOKEN (Actions reserves the name
          # GITHUB_TOKEN), but the app reads the GITHUB_TOKEN env var — so we map it.
          GITHUB_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
          GITHUB_REPO: dkcodes121617/wizcodes_main_website
          GITHUB_BRANCH: main
          GIT_AUTHOR_NAME: WizCodes Blog Bot
          GIT_AUTHOR_EMAIL: business@wizcodes.site
          MAX_POSTS_PER_DAY: "1"
          AVG_POSTS_PER_DAY: "0.3"
          PUBLISH_WINDOW_START: "8"
          PUBLISH_WINDOW_END: "22"
          MIN_GAP_HOURS: "4"
          SCHEDULE_TZ: Asia/Kolkata
          TOPIC_SIM_THRESHOLD: "0.82"
          BODY_SIM_THRESHOLD: "0.86"
          DRY_RUN: "0"
          LOG_LEVEL: INFO
        run: |
          if [ "${{ inputs.force }}" = "true" ]; then
            python main.py --now
          else
            python main.py
          fi
